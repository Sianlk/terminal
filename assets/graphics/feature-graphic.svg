      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#10B981"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="500" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="870" cy="100" r="160" fill="white" opacity="0.08"/>
  <circle cx="921" cy="375" r="240" fill="white" opacity="0.06"/>
