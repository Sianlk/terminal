  <text x="195" y="492" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="16" font-weight="bold" fill="white" text-anchor="middle">Sign In</text>
  <!-- Caption -->
  <text x="195" y="620" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="18" font-weight="bold" fill="#111827" text-anchor="middle">Secure Sign In</text>
  <text x="195" y="648" font-family="SF Pro Display, Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280" text-anchor="middle">MFA · OAuth · Biometrics</text>
