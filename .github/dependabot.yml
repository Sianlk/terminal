version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "javascript"]
    commit-message:
      prefix: "chore(deps)"
    groups:
      expo:
        patterns: ["expo*", "@expo*"]
      react-native:
        patterns: ["react-native*", "@react-navigation*"]
      testing:
        patterns: ["jest*", "@testing-library*"]

  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    open-pull-requests-limit: 10
    labels: ["dependencies", "python"]
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
      timezone: "UTC"
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "chore(ci)"
