name-template: "v$RESOLVED_VERSION"
tag-template: "v$RESOLVED_VERSION"
categories:
  - title: "Breaking Changes"
    labels: ["breaking"]
  - title: "New Features"
    labels: ["feature", "enhancement"]
  - title: "Bug Fixes"
    labels: ["bug", "fix"]
  - title: "Security"
    labels: ["security"]
  - title: "Performance"
    labels: ["performance"]
  - title: "Dependencies"
    labels: ["dependencies"]
change-template: "- $TITLE @$AUTHOR (#$NUMBER)"
version-resolver:
  major:
    labels: ["breaking"]
  minor:
    labels: ["feature", "enhancement"]
  patch:
    labels: ["bug", "fix", "security", "dependencies", "performance"]
  default: patch
template: |
  ## What Changed

  $CHANGES

  **Full Changelog**: $PREVIOUS_TAG...v$RESOLVED_VERSION
