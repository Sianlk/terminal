name: Store Publish

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options: [all, ios, android]
      profile:
        description: 'EAS build profile'
        required: true
        default: 'production'
        type: choice
        options: [development, preview, production]

jobs:
  build-and-submit:
    name: EAS Build & Submit
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build iOS (production)
        if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'ios'
        run: |
          eas build --platform ios --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Build Android (production)
        if: github.event.inputs.platform == 'all' || github.event.inputs.platform == 'android'
        run: |
          eas build --platform android --profile ${{ github.event.inputs.profile || 'production' }} --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Submit to App Stores
        if: startsWith(github.ref, 'refs/tags/')
        run: eas submit --platform all --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
